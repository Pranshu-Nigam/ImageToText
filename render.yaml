/**
 * Render Blueprint Specification
 * This file allows Render to automatically deploy your full-stack app.
 */

services:
  # 1. Backend API (Node.js)
  - type: web
    name: textlens-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromContext: frontendUrl
      - key: PORT
        value: 10000

  # 2. Frontend (Static Site)
  - type: web
    name: textlens-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromContext: apiUrl
    rewriteRules:
      - source: /api/*
        destination: https://textlens-api.onrender.com/api/* # Update with your final URL
